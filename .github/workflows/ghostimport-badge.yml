name: Ghost Import Badge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Run ghostimport
        run: node dist/cli.js --badge --quiet || true

      - name: Upload badge JSON
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: ghostimport-badge
          path: ghostimport-badge.json

      # Option A: Commit badge to repo
      - name: Commit badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ghostimport-badge.json
          git diff --cached --quiet || git commit -m "chore: update ghostimport badge [skip ci]"
          git push

      # Option B (alternative): Update a Gist instead
      # Uncomment and set GIST_ID secret if you prefer not committing to the repo
      # - name: Update Gist
      #   uses: exuanbo/actions-deploy-gist@v1
      #   with:
      #     token: ${{ secrets.GIST_TOKEN }}
      #     gist_id: <your-gist-id>
      #     file_path: ghostimport-badge.json
