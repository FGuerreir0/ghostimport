name: 'ghostimport'
description: 'Detect hallucinated npm imports in your code — packages that do not exist on npm, generated by AI coding tools'
author: 'Fábio Guerreiro'

branding:
  icon: 'alert-triangle'
  color: 'red'

inputs:
  path:
    description: 'Directory to scan (default: repo root)'
    required: false
    default: '.'
  quiet:
    description: 'Only show problems in output'
    required: false
    default: 'true'
  scary:
    description: 'Check supply chain attack risk'
    required: false
    default: 'false'
  fail-on-hallucinated:
    description: 'Fail the step if hallucinated imports are found'
    required: false
    default: 'true'

outputs:
  hallucinated:
    description: 'Number of hallucinated packages found'
  packages:
    description: 'Total unique packages checked'
  result:
    description: 'Full JSON result'

runs:
  using: 'composite'
  steps:
    - name: Run ghostimport
      id: scan
      shell: bash
      run: |
        ARGS="${{ inputs.path }}"
        if [ "${{ inputs.quiet }}" = "true" ]; then ARGS="$ARGS --quiet"; fi
        if [ "${{ inputs.scary }}" = "true" ]; then ARGS="$ARGS --scary"; fi
        ARGS="$ARGS --json"

        set +e
        RESULT=$(npx ghostimport@latest $ARGS 2>/dev/null)
        EXIT_CODE=$?
        set -e

        HALLUCINATED=$(echo "$RESULT" | jq -r '.hallucinated | length')
        PACKAGES=$(echo "$RESULT" | jq -r '.packages')

        echo "hallucinated=$HALLUCINATED" >> $GITHUB_OUTPUT
        echo "packages=$PACKAGES" >> $GITHUB_OUTPUT

        # Write multiline JSON to output
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "result<<$EOF" >> $GITHUB_OUTPUT
        echo "$RESULT" >> $GITHUB_OUTPUT
        echo "$EOF" >> $GITHUB_OUTPUT

        # Summary
        if [ "$HALLUCINATED" -gt 0 ]; then
          echo "### 👻 ghostimport found $HALLUCINATED hallucinated package(s)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$RESULT" | jq '.hallucinated' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          if [ "${{ inputs.fail-on-hallucinated }}" = "true" ]; then
            exit 1
          fi
        else
          echo "### ✅ ghostimport — no hallucinated imports ($PACKAGES packages checked)" >> $GITHUB_STEP_SUMMARY
        fi
